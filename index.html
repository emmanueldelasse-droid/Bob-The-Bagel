<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>BOBtheBAGEL</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>

<!-- CSS -->
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/components.css"/>
<link rel="stylesheet" href="css/layout.css"/>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app"></div>
<div class="tw" id="toasts"></div>

<script type="module">
/* ============================================================
   BOBtheBAGEL — index.html
   Point d'entrée : expose window.__BOB__ et lance l'app
   ============================================================ */

// ── Imports ────────────────────────────────────────────────
import { A, sv, CATEGORY_ICONS }  from './js/state.js';
import { render, toast, gId, cSec, aP, oCats, gP, fD, fT, fDl, dDel, nISO, cap, setBApp } from './js/utils.js';
import { dLog, logout, isAdmin, canAccessKitchen, restoreSession } from './js/auth.js';
import { bApp, goSel, goShop, goKit, goAdm, switchShop, sSTb, sKTb, sSCat, sRCat, sSch, toggleDark, setLang } from './js/router.js';

// Modules commandes
import {
  sCart, qAdd, sNote, sDel, sDelT,
  oSum, cxSum, sbO, dupeO,
  sOS, sOC, saveComment,
  uOD, uOT, cfV, cfR,
  cfSRc, cfKRc,
  stEQ, sEQ, svEQ, cxEQ,
  tO, tKS, tRc,
  okCf, cxCf,
} from './js/modules/orders.js';

// Modules stock
import { uSt, tSL, tARc, sRS, sRC, sbRc, prtPDF } from './js/modules/stock.js';

// Modules calendrier
import {
  openCalForm, closeCalForm, saveEvent, editEvent, deleteEvent,
  setCalField, toggleCalShop, setCalFilter, setCalTab, setEventStatus,
  setCalColorMode, calNavPrev, calNavNext, calNavToday,
  addCheckItem, toggleCheckItem, removeCheckItem,
  duplicateEvent, exportEventPDF,
} from './js/modules/calendar.js';

// Modules chat
import {
  selectConv, sendMessage, setChatInput, setChatPriority,
  getOrCreateOrderConv, openOrderChat, deleteMessage,
} from './js/modules/chat.js';

// Modules admin
import {
  sAT, sBn, svBn, clBn,
  tAU, sNU, aU, dU,
  tAP, sNP, aP2, tP,
  trPh, hdPh, svPr,
} from './js/modules/admin.js';

// ── Init Supabase (test de connexion) ──────────────────────
import { getSupabase } from './js/api/supabase.js';
const sb = getSupabase();
if (sb) {
  console.log('[BOB] ✅ Supabase client chargé');
} else {
  console.warn('[BOB] ⚠️ Supabase client non disponible (vérifier la clé et la CDN)');
}

// ── Exposition globale window.__BOB__ ──────────────────────
// Nécessaire pour que les handlers HTML inline (onclick="...") fonctionnent
// avec des modules ES6.
window.__BOB__ = {
  // State & constants (pour cSec dans utils)
  CATEGORY_ICONS,

  // Auth
  dLog, logout,

  // Navigation
  goSel, goShop, goKit, goAdm, switchShop,
  sSTb, sKTb, sSCat, sRCat, sSch,
  toggleDark, setLang,

  // Commandes
  sCart, qAdd, sNote, sDel, sDelT,
  oSum, cxSum, sbO, dupeO,
  sOS, sOC, saveComment,
  uOD, uOT, cfV, cfR,
  cfSRc, cfKRc,
  stEQ, sEQ, svEQ, cxEQ,
  tO, tKS, tRc,
  okCf, cxCf,

  // Stock
  uSt, tSL, tARc, sRS, sRC, sbRc, prtPDF,

  // Calendrier
  openCalForm, closeCalForm, saveEvent, editEvent, deleteEvent,
  setCalField, toggleCalShop, setCalFilter, setCalTab, setEventStatus,
  setCalColorMode, calNavPrev, calNavNext, calNavToday,
  addCheckItem, toggleCheckItem, removeCheckItem,
  duplicateEvent, exportEventPDF,
  _toggleEv: (id) => { A['oEv_' + id] = !A['oEv_' + id]; import('./js/utils.js').then(({render})=>render()); },

  // Chat
  selectConv, sendMessage, setChatInput, setChatPriority,
  getOrCreateOrderConv, openOrderChat, deleteMessage,

  // Admin
  sAT, sBn, svBn, clBn,
  tAU, sNU, aU, dU,
  tAP, sNP, aP2, tP,
  trPh, hdPh, svPr,
};

// ── Init ───────────────────────────────────────────────────
if (!A.del) A.del = dDel();

// Restaure la session Supabase si elle existe (rafraîchissement de page),
// puis affiche l'app.
(async () => {
  await restoreSession();
  render();
})();
</script>
</body>
</html>
