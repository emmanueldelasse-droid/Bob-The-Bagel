<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>BOBtheBAGEL</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/components.css"/>
<link rel="stylesheet" href="css/layout.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app"></div>
<div class="tw" id="toasts"></div>

<script type="module">
/* ============================================================
   BOBtheBAGEL — index.html
   Point d'entrée : expose window.__BOB__ et lance l'app
   ============================================================ */

import { A, CATEGORY_ICONS, setRuntimeFlag } from './js/state.js';
import { render, cSec, aP, oCats, gP, fD, fT, fDl, dDel, nISO, cap, setBApp } from './js/utils.js';
import { dLog, logout, isAdmin, canAccessKitchen, restoreSession } from './js/auth.js';
import { bApp, goSel, goShop, goKit, goAdm, switchShop, sSTb, sKTb, sSCat, sRCat, sSch, toggleDark, setLang } from './js/router.js';

import {
  sCart, qAdd, sNote, sDel, sDelT,
  oSum, cxSum, sbO, dupeO,
  sOS, sOC, saveComment,
  uOD, uOT, cfV, cfR,
  cfSRc, cfKRc,
  stEQ, sEQ, svEQ, cxEQ,
  tO, tKS, tRc,
  okCf, cxCf,
  openReserveDraft, setReserveItem, setReserveNote, cancelReserveDraft, submitReserve,
} from './js/modules/orders.js';

import {
  markAllSeen as markAllNotifsSeen,
  markNotificationSeen,
  removeNotification,
} from './js/modules/notifications.js';

import { uSt, tSL, tARc, sRS, sRC, sbRc, prtPDF } from './js/modules/stock.js';

import {
  openCalForm, closeCalForm, saveEvent, editEvent, deleteEvent,
  setCalField, toggleCalShop, setCalFilter, setCalTab, setEventStatus,
  setCalColorMode, calNavPrev, calNavNext, calNavToday,
  addCheckItem, toggleCheckItem, removeCheckItem,
  duplicateEvent, exportEventPDF,
} from './js/modules/calendar.js';

import {
  selectConv, sendMessage, setChatInput, setChatPriority,
  getOrCreateOrderConv, openOrderChat, deleteMessage,
  sendChatPhoto, triggerChatPhotoInput, handleChatPhotoChange,
} from './js/modules/chat.js';

import {
  sAT, sBn, svBn, clBn,
  tAU, sNU, aU, dU,
  tAP, sNP, aP2, tP,
  trPh, hdPh, svPr,
} from './js/modules/admin.js';

import {
  setAuditTab, setAuditFilter,
  openAuditDraft, openAuditDetail, editAudit, cancelAuditDraft,
  setDraftShop, setDraftNote, setItemStatus, setItemComment,
  triggerAuditPhotoInput, handleAuditPhotoChange, removeDraftPhoto,
  saveAuditDraft, deleteAudit,
} from './js/modules/audit.js';

import {
  setPlanTab, setPlanShopFilter, setPlanRefDate, shiftPlanRef, planToday,
  openPlanDraft, editPlanShift, cancelPlanDraft,
  setPlanDraft, savePlanDraft, deletePlanShift,
} from './js/modules/planning.js';

import { getSupabase } from './js/api/supabase.js';

const sb = getSupabase();
if (sb) console.log('[BOB] ✅ Supabase client chargé');
else console.warn('[BOB] ⚠️ Supabase client non disponible (vérifier la clé et la CDN)');

window.__BOB__ = {
  A,
  CATEGORY_ICONS,

  dLog, logout,

  goSel, goShop, goKit, goAdm, switchShop,
  sSTb, sKTb, sSCat, sRCat, sSch,
  toggleDark, setLang,

  sCart, qAdd, sNote, sDel, sDelT,
  oSum, cxSum, sbO, dupeO,
  sOS, sOC, saveComment,
  uOD, uOT, cfV, cfR,
  cfSRc, cfKRc,
  stEQ, sEQ, svEQ, cxEQ,
  tO, tKS, tRc,
  okCf, cxCf,
  openReserveDraft, setReserveItem, setReserveNote, cancelReserveDraft, submitReserve,

  markAllNotifsSeen, markNotificationSeen, removeNotification,
  toggleNotifs: () => { A.showNotifs = !A.showNotifs; render(); },

  uSt, tSL, tARc, sRS, sRC, sbRc, prtPDF,

  openCalForm, closeCalForm, saveEvent, editEvent, deleteEvent,
  setCalField, toggleCalShop, setCalFilter, setCalTab, setEventStatus,
  setCalColorMode, calNavPrev, calNavNext, calNavToday,
  addCheckItem, toggleCheckItem, removeCheckItem,
  duplicateEvent, exportEventPDF,
  _toggleEv: (id) => { A['oEv_' + id] = !A['oEv_' + id]; import('./js/utils.js').then(({ render }) => render()); },

  selectConv, sendMessage, setChatInput, setChatPriority,
  getOrCreateOrderConv, openOrderChat, deleteMessage,
  sendChatPhoto, triggerChatPhotoInput, handleChatPhotoChange,

  sAT, sBn, svBn, clBn,
  tAU, sNU, aU, dU,
  tAP, sNP, aP2, tP,
  trPh, hdPh, svPr,

  setAuditTab, setAuditFilter,
  openAuditDraft, openAuditDetail, editAudit, cancelAuditDraft,
  setDraftShop, setDraftNote, setItemStatus, setItemComment,
  triggerAuditPhotoInput, handleAuditPhotoChange, removeDraftPhoto,
  saveAuditDraft, deleteAudit,

  setPlanTab, setPlanShopFilter, setPlanRefDate, shiftPlanRef, planToday,
  openPlanDraft, editPlanShift, cancelPlanDraft,
  setPlanDraft, savePlanDraft, deletePlanShift,
};

setBApp(() => bApp());
if (!A.del) A.del = dDel();

(async () => {
  await restoreSession();
  setRuntimeFlag('booting', false);
  render();
})();
</script>
</body>
</html>
